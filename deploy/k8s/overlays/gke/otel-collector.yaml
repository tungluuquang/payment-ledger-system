apiVersion: v1
kind: ConfigMap
metadata:
  name: gke-platform-config
data:
  CLOUD_SQL_INSTANCE_CONNECTION_NAME: CLOUD_SQL_INSTANCE_CONNECTION_NAME
  GCP_PROJECT_ID: GCP_PROJECT_ID
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      zipkin:
        endpoint: 0.0.0.0:9411
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 384
      batch: {}
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    exporters:
      googlecloud:
        project: ${env:GCP_PROJECT_ID}
    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers: [zipkin, otlp]
          processors: [memory_limiter, batch]
          exporters: [googlecloud]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      serviceAccountName: otel-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.130.1
          args:
            - --config=/etc/otel/config.yaml
          env:
            - name: GCP_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: gke-platform-config
                  key: GCP_PROJECT_ID
          ports:
            - name: zipkin
              containerPort: 9411
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: zipkin
      port: 9411
      targetPort: zipkin
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: otel-collector
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
