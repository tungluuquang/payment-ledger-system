apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-ledger-runtime
  annotations:
    iam.gke.io/gcp-service-account: GCP_RUNTIME_SERVICE_ACCOUNT
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  annotations:
    iam.gke.io/gcp-service-account: GCP_RUNTIME_SERVICE_ACCOUNT
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: otel-discovery
rules:
  - apiGroups:
      - ""
    resources:
      - endpoints
      - pods
      - services
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: otel-discovery
subjects:
  - kind: ServiceAccount
    name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: otel-discovery

