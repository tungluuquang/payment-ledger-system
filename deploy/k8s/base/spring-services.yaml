apiVersion: v1
kind: ConfigMap
metadata:
  name: service-discovery-config
data:
  PORT: "8761"
  EUREKA_HOSTNAME: service-discovery
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-discovery
  labels:
    app.kubernetes.io/name: service-discovery
    platform.payment-ledger.io/runtime: "true"

spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: service-discovery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service-discovery
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8761"
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: service-discovery
          image: payment-ledger/service-discovery:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: platform-config
            - configMapRef:
                name: service-discovery-config
            - secretRef:
                name: platform-secrets
          env:
            - name: JAVA_TOOL_OPTIONS
              value: -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          lifecycle:
            preStop:
              exec:
                command: [sh, -c, "sleep 5"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: service-discovery
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8761"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: service-discovery
  ports:
    - name: http
      port: 8761
      targetPort: http

