spring:
  application:
    name: user-service

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:user_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER:http://localhost:9000}
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

server:
  port: ${PORT:8086}
  shutdown: graceful

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

user:
  bootstrap:
    admin:
      enabled: ${USER_BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${USER_BOOTSTRAP_ADMIN_USERNAME:admin}
      email: ${USER_BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
      password: ${USER_BOOTSTRAP_ADMIN_PASSWORD:}
      full-name: ${USER_BOOTSTRAP_ADMIN_FULL_NAME:System Admin}
