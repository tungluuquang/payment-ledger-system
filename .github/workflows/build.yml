name: Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run backend tests
        run: ./gradlew testAll --no-daemon

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Validate deployment assets
        run: |
          bash -n scripts/*.sh
          docker compose config --quiet
          GCP_PROJECT_ID=test-project \
          GAR_LOCATION=us-central1 \
          GAR_REPOSITORY=payment-ledger \
          IMAGE_TAG="${GITHUB_SHA}" \
          GKE_HOSTNAME=payments.example.com \
          GKE_STATIC_IP_NAME=payment-ledger-ip \
          CLOUD_SQL_INSTANCE_CONNECTION_NAME=test-project:us-central1:payment-ledger \
          GCP_RUNTIME_SERVICE_ACCOUNT=payment-ledger-runtime@test-project.iam.gserviceaccount.com \
            ./scripts/render-gke-manifests.sh >/tmp/gke.yaml

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: service-discovery
            context: .
            file: Dockerfile.service
            build_args: MODULE=service-discovery
          - image: authorization-server
            context: .
            file: Dockerfile.service
            build_args: MODULE=authorization-server
          - image: user-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=user-service
          - image: api-gateway
            context: .
            file: Dockerfile.service
            build_args: MODULE=api-gateway
          - image: command-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=command-service
          - image: saga-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=saga-service
          - image: fraud-check-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=fraud-check-service
          - image: account-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=account-service
          - image: ledger-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=ledger-service
          - image: projection-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=projection-service
          - image: reconciliation-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=reconciliation-service
          - image: analytics-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=analytics-service
          - image: audit-service
            context: .
            file: Dockerfile.service
            build_args: MODULE=audit-service
          - image: frontend
            context: frontend
            file: frontend/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry authentication
        run: gcloud auth configure-docker "${{ vars.GAR_LOCATION }}-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true

