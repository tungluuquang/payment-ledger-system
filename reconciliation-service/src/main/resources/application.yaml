spring:
  application:
    name: reconciliation-service

  config:
    import: optional:file:.env[.properties]

  datasource:
    account:
      url: jdbc:postgresql://${HOST:localhost}:${POSTGRES_PORT:5432}/${ACCOUNT_POSTGRES_DB:account_db}
      username: ${POSTGRES_USER:postgres}
      password: ${POSTGRES_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: ${RECONCILIATION_ACCOUNT_DB_MAX_POOL_SIZE:5}
        read-only: true
    ledger:
      url: jdbc:postgresql://${HOST:localhost}:${POSTGRES_PORT:5432}/${LEDGER_POSTGRES_DB:ledger_db}
      username: ${POSTGRES_USER:postgres}
      password: ${POSTGRES_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: ${RECONCILIATION_LEDGER_DB_MAX_POOL_SIZE:5}
        read-only: true

server:
  port: ${PORT:8088}
  shutdown: graceful

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
