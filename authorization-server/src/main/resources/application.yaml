spring:
  application:
    name: authorization-server

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:5432}/${AUTH_DB_NAME:user_db}
    username: ${AUTH_DB_USER:postgres}
    password: ${AUTH_DB_PASSWORD:postgres}

server:
  port: ${PORT:9000}
  shutdown: graceful
  forward-headers-strategy: framework

authorization:
  issuer: ${AUTH_ISSUER:http://localhost:9000}
  client:
    id: ${AUTH_CLIENT_ID:payment-ledger-client}
    secret: ${AUTH_CLIENT_SECRET:change-me}
    redirect-uri: ${AUTH_REDIRECT_URI:http://127.0.0.1:8080/login/oauth2/code/payment-ledger}
    post-logout-redirect-uri: ${AUTH_POST_LOGOUT_REDIRECT_URI:http://127.0.0.1:8080/}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
