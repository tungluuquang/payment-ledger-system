spring:
  datasource:
    url: jdbc:h2:mem:command_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    admin:
      fail-fast: false
      auto-create: false

eureka:
  client:
    enabled: false

server:
  port: 0
