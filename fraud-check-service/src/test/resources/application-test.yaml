spring:
  datasource:
    url: jdbc:h2:mem:fraud_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    admin:
      fail-fast: false
      auto-create: false

server:
  port: 0

fraud:
  rules:
    version: test-v1
    max-amount:
      VND: 1000000
      USD: 100
      EUR: 100
    velocity:
      window-seconds: 3600
      max-payments: 2
    denied-account-ids: ""
