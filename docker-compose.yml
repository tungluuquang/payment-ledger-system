name: payment-ledger-system

x-service-environment: &service-environment
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
  EUREKA_CLIENT_ENABLED: "true"
  HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

x-service-build: &service-build
  context: .
  dockerfile: Dockerfile.service

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:29092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 20

  service-discovery:
    build:
      <<: *service-build
      args:
        MODULE: service-discovery
    environment:
      PORT: "8761"
      EUREKA_HOSTNAME: service-discovery
    ports:
      - "8761:8761"

  user-service:
    build:
      <<: *service-build
      args:
        MODULE: user-service
    environment:
      <<: *service-environment
      PORT: "8086"
      POSTGRES_DB: user_db
      AUTH_ISSUER: http://localhost:9000
      AUTH_JWK_SET_URI: http://authorization-server:9000/oauth2/jwks
      USER_BOOTSTRAP_ADMIN_ENABLED: "true"
      USER_BOOTSTRAP_ADMIN_USERNAME: admin
      USER_BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      USER_BOOTSTRAP_ADMIN_PASSWORD: change-me-now
    depends_on:
      postgres:
        condition: service_healthy
      service-discovery:
        condition: service_started
    ports:
      - "8086:8086"

  authorization-server:
    build:
      <<: *service-build
      args:
        MODULE: authorization-server
    environment:
      PORT: "9000"
      AUTH_DB_HOST: postgres
      AUTH_DB_PORT: "5432"
      AUTH_DB_NAME: user_db
      AUTH_DB_USER: postgres
      AUTH_DB_PASSWORD: postgres
      AUTH_ISSUER: http://localhost:9000
      AUTH_CLIENT_SECRET: change-me
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    ports:
      - "9000:9000"

  command-service:
    build:
      <<: *service-build
      args:
        MODULE: command-service
    environment:
      <<: *service-environment
      PORT: "8081"
      POSTGRES_DB: command_db
      AUTH_ISSUER: http://localhost:9000
      AUTH_JWK_SET_URI: http://authorization-server:9000/oauth2/jwks
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authorization-server:
        condition: service_started

  saga-service:
    build:
      <<: *service-build
      args:
        MODULE: saga-service
    environment:
      <<: *service-environment
      PORT: "8087"
      POSTGRES_DB: saga_db
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  fraud-check-service:
    build:
      <<: *service-build
      args:
        MODULE: fraud-check-service
    environment:
      <<: *service-environment
      PORT: "8084"
      POSTGRES_DB: fraud_db
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  account-service:
    build:
      <<: *service-build
      args:
        MODULE: account-service
    environment:
      <<: *service-environment
      PORT: "8082"
      POSTGRES_DB: account_db
      AUTH_ISSUER: http://localhost:9000
      AUTH_JWK_SET_URI: http://authorization-server:9000/oauth2/jwks
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authorization-server:
        condition: service_started

  ledger-service:
    build:
      <<: *service-build
      args:
        MODULE: ledger-service
    environment:
      <<: *service-environment
      PORT: "8083"
      POSTGRES_DB: ledger_db
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  projection-service:
    build:
      <<: *service-build
      args:
        MODULE: projection-service
    environment:
      <<: *service-environment
      PORT: "8085"
      POSTGRES_DB: projection_db
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build:
      <<: *service-build
      args:
        MODULE: api-gateway
    environment:
      PORT: "8080"
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      AUTH_ISSUER: http://localhost:9000
      AUTH_JWK_SET_URI: http://authorization-server:9000/oauth2/jwks
    depends_on:
      authorization-server:
        condition: service_started
      service-discovery:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  postgres-data:
