spring:
  datasource:
    url: jdbc:h2:mem:audit;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    admin:
      auto-create: false
      fail-fast: false

management:
  health:
    kafka:
      enabled: false
  tracing:
    sampling:
      probability: 0

eureka:
  client:
    enabled: false
